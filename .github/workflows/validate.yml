name: Validate

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate marketplace.json
        run: |
          if [[ ! -f .claude-plugin/marketplace.json ]]; then
            echo "ERROR: .claude-plugin/marketplace.json not found"
            exit 1
          fi
          python3 -c "
          import json, sys
          m = json.load(open('.claude-plugin/marketplace.json'))
          errors = []
          if 'name' not in m:
              errors.append('missing required field: name')
          if 'owner' not in m or 'name' not in m.get('owner', {}):
              errors.append('missing required field: owner.name')
          if 'plugins' not in m or not isinstance(m.get('plugins'), list):
              errors.append('missing or invalid plugins array')
          if errors:
              for e in errors:
                  print(f'ERROR: marketplace.json {e}')
              sys.exit(1)
          print(f'OK: marketplace.json ({m[\"name\"]}, {len(m[\"plugins\"])} plugin(s))')
          "

      - name: Validate plugin.json for each plugin
        run: |
          errors=0
          for plugin_dir in plugins/*/; do
            plugin_name=$(basename "$plugin_dir")
            plugin_file="$plugin_dir/.claude-plugin/plugin.json"

            if [[ ! -f "$plugin_file" ]]; then
              echo "ERROR: $plugin_dir is missing .claude-plugin/plugin.json"
              errors=$((errors + 1))
              continue
            fi

            python3 -c "
          import json, sys
          p = json.load(open('$plugin_file'))
          missing = [f for f in ['name', 'version'] if f not in p]
          if missing:
              print(f'ERROR: $plugin_file missing required fields: {missing}')
              sys.exit(1)
          print(f'OK: {p[\"name\"]} v{p[\"version\"]}')
          " || errors=$((errors + 1))
          done

          if [[ $errors -gt 0 ]]; then
            echo "Found $errors error(s)"
            exit 1
          fi

      - name: Validate SKILL.md frontmatter
        run: |
          errors=0
          for skill_file in plugins/*/skills/*/SKILL.md; do
            [[ -f "$skill_file" ]] || continue

            fm_desc=$(sed -n '/^---$/,/^---$/p' "$skill_file" | grep '^description:' | head -1)
            if [[ -z "$fm_desc" ]]; then
              echo "ERROR: $skill_file is missing 'description' in frontmatter"
              errors=$((errors + 1))
            else
              echo "OK: $skill_file"
            fi
          done

          if [[ $errors -gt 0 ]]; then
            echo "Found $errors error(s)"
            exit 1
          fi

      - name: Check CHANGELOG has Unreleased section
        run: |
          if ! grep -q '\[Unreleased\]' CHANGELOG.md; then
            echo "ERROR: CHANGELOG.md is missing [Unreleased] section"
            exit 1
          fi
          echo "OK: CHANGELOG.md has [Unreleased] section"
